openapi: 3.1.0
info:
  title: DAHAB Backend API
  version: 1.0.0
  description: |
    Source-of-truth API for the DAHAB frontend. All numbers, totals, charts,
    and KPIs originate from this API. The frontend never invents values.
    See docs/BACKEND_SOURCE_OF_TRUTH.md.

    ## Conventions
    - **Money**: every monetary field is a BIGINT in the currency's minor unit
      (USD/EUR cents, LYD dirham). Never floats. Field suffix: `_minor`.
    - **Currencies**: `USD`, `EUR`, `LYD`.
    - **Response envelope**: every JSON response is
      `{ success: boolean, data: T, message: string, timestamp: string }`.
      Errors follow `{ success: false, code?: string, message: string, details?: object }`
      with the matching HTTP status (400/401/403/404/409/422/500).
    - **Auth**: Bearer JWT in `Authorization: Bearer <token>`. The token is
      issued by `POST /api/auth/login` (or the passkey login flow) and refreshed
      by `POST /api/auth/refresh`.
    - **Roles**: `admin`, `teller`, `auditor`, `consumer`. Each operation lists
      the roles allowed via the `x-roles` extension and via tags
      (`role:admin`, `role:teller`, ...).

    ## Auth flow
    ```
    POST /api/auth/login {email,password}
      -> 200 { access_token, refresh_token, user, must_change_password }
         |
         |-- must_change_password=true ---> client redirects to /change-password
         |                                  POST /api/auth/change-password
         |
         |-- must_change_password=false --> normal app

    Optional passkey enrollment (after login):
      POST /api/auth/passkey/register/start   -> WebAuthn challenge
      POST /api/auth/passkey/register/finish  -> persists credential

    Passwordless login:
      POST /api/auth/passkey/login/start      -> WebAuthn challenge (public)
      POST /api/auth/passkey/login/finish     -> { access_token, ... }

    Forgot / reset:
      POST /api/auth/forgot-password {email}
      POST /api/auth/reset-password  {token,newPassword}
    ```
servers:
  - url: https://api.dahablibya.com
    description: Production
  - url: https://api.dev.dahablibya.com
    description: Dev / preview
security:
  - bearerAuth: []
tags:
  - { name: auth,         description: Login, logout, passkeys, password reset, current user. }
  - { name: dashboard,    description: Aggregated KPIs for staff/teller/auditor home screens. }
  - { name: holders,      description: Account holders (customers) — search, create, link accounts. }
  - { name: accounts,     description: Holder accounts (per-currency wallets) — balance, ledger, limits. }
  - { name: transactions, description: Cash deposits, withdrawals, corrections. }
  - { name: approvals,    description: Pending tx approvals (admin queue). }
  - { name: vaults,       description: Internal cash/bank vaults, FX rates, vault targets. }
  - { name: groups,       description: Account groups (cohorts of holder accounts). }
  - { name: imports,      description: Excel import batches and review queue. }
  - { name: reports,      description: Business, cash-flow, approval-speed, liquidity, compliance reports. }
  - { name: audit,        description: Append-only audit log. }
  - { name: me,           description: Current-user notifications, preferences, recent activity. }
  - { name: admin,        description: Admin-only configuration (branches, FX rates, users, vault targets, push). }
  - { name: portal,       description: Customer-facing read-only endpoints (consumer role). }
  - { name: push,         description: Web-push subscriptions and test sends. }
  - { name: 'role:admin',    description: Requires admin role. }
  - { name: 'role:teller',   description: Requires teller role. }
  - { name: 'role:auditor',  description: Requires auditor role. }
  - { name: 'role:consumer', description: Requires consumer role (portal). }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit: { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
    Cursor: { name: cursor, in: query, schema: { type: string, nullable: true } }
    Days: { name: days, in: query, schema: { type: integer, minimum: 1, maximum: 365, default: 30 } }

  schemas:
    Currency: { type: string, enum: [USD, EUR, LYD] }
    AppRole: { type: string, enum: [admin, teller, auditor, consumer] }
    TxDirection: { type: string, enum: [deposit, withdraw] }
    TxStatus: { type: string, enum: [posted, pending, rejected, reversed] }
    VaultChannel: { type: string, enum: [cash, bank] }
    AccountKind: { type: string, enum: [customer, vault] }
    AccountNature: { type: string, enum: [Debit, Credit] }
    AlertSeverity: { type: string, enum: [info, warning, critical] }

    Envelope:
      type: object
      required: [success, data, message, timestamp]
      properties:
        success: { type: boolean }
        data: {}
        message: { type: string }
        timestamp: { type: string, format: date-time }

    Pagination:
      type: object
      required: [items, next_cursor]
      properties:
        items: { type: array, items: {} }
        next_cursor: { type: string, nullable: true }

    Error:
      type: object
      required: [success, message]
      properties:
        success: { type: boolean, enum: [false] }
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    AuthMe:
      type: object
      required: [user_id, full_name, roles, must_change_password]
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, nullable: true }
        full_name: { type: string }
        roles: { type: array, items: { $ref: '#/components/schemas/AppRole' } }
        must_change_password: { type: boolean }
        branch:
          nullable: true
          type: object
          properties:
            id: { type: integer }
            name: { type: string }

    UserRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, nullable: true }
        full_name: { type: string }
        roles: { type: array, items: { $ref: '#/components/schemas/AppRole' } }
        created_at: { type: string, format: date-time }

    Holder:
      type: object
      properties:
        id: { type: integer }
        dahab_account_number: { type: string }
        canonical_name: { type: string }
        holder_type: { type: string, enum: [INDIVIDUAL, BUSINESS, TRUST] }
        status: { type: string }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        owner_user_id: { type: string, format: uuid, nullable: true }
        linked_account_count: { type: integer }
        totals_by_currency:
          type: array
          items:
            type: object
            properties:
              currency: { $ref: '#/components/schemas/Currency' }
              total_minor: { type: integer }
        created_at: { type: string, format: date-time }

    HolderAccount:
      type: object
      properties:
        id: { type: integer }
        account_holder_id: { type: integer }
        account_number: { type: string }
        account_display_name: { type: string }
        account_alias_name: { type: string, nullable: true }
        currency_code: { $ref: '#/components/schemas/Currency' }
        account_nature: { $ref: '#/components/schemas/AccountNature' }
        current_balance_minor: { type: integer }
        status: { type: string }
        withdraw_limit_amount_minor: { type: integer }
        withdraw_limit_enabled: { type: boolean }
        is_primary_account: { type: boolean }

    LedgerEntry:
      type: object
      properties:
        id: { type: integer }
        tx_number: { type: string }
        posted_at: { type: string, format: date-time }
        description: { type: string, nullable: true }
        debit_amount_minor: { type: integer }
        credit_amount_minor: { type: integer }
        balance_after_minor: { type: integer }
        currency_code: { $ref: '#/components/schemas/Currency' }

    Transaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        tx_number: { type: string }
        customer_account_id: { type: string }
        vault_account_id: { type: string, nullable: true }
        direction: { $ref: '#/components/schemas/TxDirection' }
        channel: { $ref: '#/components/schemas/VaultChannel' }
        currency: { $ref: '#/components/schemas/Currency' }
        amount_minor: { type: integer }
        requested_amount_minor: { type: integer, nullable: true }
        status: { $ref: '#/components/schemas/TxStatus' }
        comment: { type: string }
        review_reason: { type: string, nullable: true }
        reject_reason: { type: string, nullable: true }
        correction_reason: { type: string, nullable: true }
        reverses_tx_id: { type: string, nullable: true }
        corrected_by_tx_id: { type: string, nullable: true }
        created_by_user_id: { type: string, format: uuid }
        approved_by_user_id: { type: string, format: uuid, nullable: true }
        branch_id: { type: integer, nullable: true }
        partial_approved: { type: boolean }
        posted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    VaultAccount:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        vault_channel: { $ref: '#/components/schemas/VaultChannel' }
        status: { type: string }
        balances:
          type: array
          items:
            type: object
            properties:
              currency: { $ref: '#/components/schemas/Currency' }
              balance_minor: { type: integer }

    VaultTarget:
      type: object
      properties:
        vault_account_id: { type: string }
        currency: { $ref: '#/components/schemas/Currency' }
        target_minor: { type: integer }
        min_minor: { type: integer }

    ConsolidatedUsd:
      type: object
      required: [total_usd_minor, breakdown, missing_rates, computed_at]
      properties:
        total_usd_minor: { type: integer }
        breakdown:
          type: array
          items:
            type: object
            properties:
              currency: { $ref: '#/components/schemas/Currency' }
              usd_rate: { type: number, nullable: true }
              rate_date: { type: string, format: date, nullable: true }
        missing_rates:
          type: array
          items: { $ref: '#/components/schemas/Currency' }
        computed_at: { type: string, format: date-time }

    FxRate:
      type: object
      properties:
        id: { type: integer }
        currency: { $ref: '#/components/schemas/Currency' }
        usd_rate: { type: number }
        as_of_date: { type: string, format: date }
        note: { type: string, nullable: true }
        created_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    Branch:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        city: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive] }
        created_at: { type: string, format: date-time }

    AccountGroup:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        group_type: { type: string }
        is_pinned: { type: boolean }
        member_count: { type: integer }
        totals_by_currency:
          type: array
          items:
            type: object
            properties:
              currency: { $ref: '#/components/schemas/Currency' }
              total_minor: { type: integer }

    ImportBatch:
      type: object
      properties:
        id: { type: integer }
        file_name: { type: string }
        status: { type: string }
        total_rows: { type: integer }
        successful_rows: { type: integer }
        review_rows: { type: integer }
        failed_rows: { type: integer }
        imported_by: { type: string, nullable: true }
        imported_at: { type: string, format: date-time }

    ReviewRow:
      type: object
      properties:
        id: { type: integer }
        raw_name: { type: string }
        suggested_account_holder_id: { type: integer, nullable: true }
        confidence_score: { type: number, nullable: true }
        review_status: { type: string }

    DashboardStaff:
      type: object
      properties:
        totals_by_currency:
          type: object
          properties:
            cash: { type: array, items: { type: object, properties: { currency: { $ref: '#/components/schemas/Currency' }, balance_minor: { type: integer } } } }
            bank: { type: array, items: { type: object, properties: { currency: { $ref: '#/components/schemas/Currency' }, balance_minor: { type: integer } } } }
            customer: { type: array, items: { type: object, properties: { currency: { $ref: '#/components/schemas/Currency' }, balance_minor: { type: integer } } } }
        pending_count: { type: integer }
        holder_count: { type: integer }
        recent_transactions: { type: array, items: { $ref: '#/components/schemas/Transaction' } }

    BusinessOverview:
      type: object
      properties:
        totals:
          type: object
          properties:
            total: { type: integer }
            posted: { type: integer }
            rejected: { type: integer }
            rejection_rate: { type: number }
        active_holders: { type: integer }
        volume_by_currency:
          type: array
          items:
            type: object
            properties:
              currency: { $ref: '#/components/schemas/Currency' }
              volume_minor: { type: integer }
              posted_count: { type: integer }
        daily_volume_7d:
          type: array
          items:
            type: object
            properties:
              day: { type: string, format: date }
              currency: { $ref: '#/components/schemas/Currency' }
              volume_minor: { type: integer }
              tx_count: { type: integer }
        currency_distribution:
          type: array
          items:
            type: object
            properties:
              currency: { $ref: '#/components/schemas/Currency' }
              balance_minor: { type: integer }
        customer_growth_7m:
          type: array
          items:
            type: object
            properties:
              month: { type: string, format: date }
              new_holders: { type: integer }
        top_accounts:
          type: array
          items:
            type: object
            properties:
              account_id: { type: string }
              name: { type: string }
              currency: { $ref: '#/components/schemas/Currency' }
              balance_minor: { type: integer }

    CashFlowDaily:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              day: { type: string, format: date }
              currency: { $ref: '#/components/schemas/Currency' }
              direction: { $ref: '#/components/schemas/TxDirection' }
              volume_minor: { type: integer }
              tx_count: { type: integer }

    ApprovalSpeed:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              day: { type: string, format: date }
              median_seconds: { type: number }
              approved_count: { type: integer }

    TellersToday:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              teller_user_id: { type: string, format: uuid }
              full_name: { type: string }
              branch: { type: string, nullable: true }
              currency: { $ref: '#/components/schemas/Currency' }
              txns_count: { type: integer }
              posted_count: { type: integer }
              rejected_count: { type: integer }
              volume_minor: { type: integer }
              avg_processing_seconds: { type: number }

    LiquidityHealth:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              account_id: { type: string }
              currency: { $ref: '#/components/schemas/Currency' }
              balance_minor: { type: integer }
              target_minor: { type: integer, nullable: true }
              min_minor: { type: integer, nullable: true }
              avg_daily_outflow_minor: { type: integer, nullable: true }
              days_of_cover: { type: number, nullable: true }

    ComplianceOverview:
      type: object
      properties:
        flagged_today: { type: integer }
        pending_reviews: { type: integer }
        resolved_today: { type: integer }
        high_risk_holders: { type: integer }
        typology:
          type: array
          items:
            type: object
            properties: { alert_type: { type: string }, count: { type: integer } }
        alert_volume_daily:
          type: array
          items:
            type: object
            properties:
              day: { type: string, format: date }
              generated: { type: integer }
              resolved: { type: integer }

    AuditRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        actor_user_id: { type: string, format: uuid, nullable: true }
        actor_full_name: { type: string, nullable: true }
        action: { type: string }
        target: { type: string, nullable: true }
        details: { type: object, additionalProperties: true, nullable: true }
        created_at: { type: string, format: date-time }

    NotificationRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        event_type: { type: string }
        severity: { $ref: '#/components/schemas/AlertSeverity' }
        title: { type: string }
        body: { type: string }
        data: { type: object, additionalProperties: true }
        transaction_id: { type: string, nullable: true }
        read_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    NotificationPreferences:
      type: object
      properties:
        enabled: { type: object, additionalProperties: { type: boolean } }
        large_tx_threshold: { type: object, additionalProperties: { type: integer } }
        low_vault_threshold: { type: object, additionalProperties: { type: integer } }
        pending_reminder_minutes: { type: integer }
        quiet_hours_start: { type: string, nullable: true }
        quiet_hours_end: { type: string, nullable: true }
        daily_summary_enabled: { type: boolean }
        daily_summary_time: { type: string }
        browser_push_enabled: { type: boolean }

  responses:
    Unauthorized: { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Forbidden:    { description: Forbidden,    content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    NotFound:     { description: Not found,    content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    BadRequest:   { description: Bad request,  content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

paths:
  /api/auth/login:
    post:
      tags: [auth]
      security: []
      summary: AUTH-1 Email/password login
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [email, password], properties: { email: { type: string, format: email }, password: { type: string, minLength: 8 } } } } } }
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/refresh: { post: { tags: [auth], security: [], summary: AUTH-2, responses: { '200': { description: OK } } } }
  /api/auth/logout:  { post: { tags: [auth], summary: AUTH-3, responses: { '200': { description: OK } } } }
  /api/auth/forgot-password: { post: { tags: [auth], security: [], summary: AUTH-4, responses: { '200': { description: OK } } } }
  /api/auth/reset-password:  { post: { tags: [auth], security: [], summary: AUTH-5, responses: { '200': { description: OK } } } }
  /api/auth/change-password: { post: { tags: [auth], summary: AUTH-6, responses: { '200': { description: OK } } } }
  /api/auth/me:
    get:
      tags: [auth]
      summary: AUTH-7 Current user
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AuthMe' } } } } }

  /api/dashboard/staff:
    get:
      tags: [dashboard, 'role:admin', 'role:teller']
      summary: DASH-1 Staff dashboard data
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DashboardStaff' } } } } }

  /api/holders:
    get:
      tags: [holders, 'role:admin', 'role:teller']
      summary: HOLD-1 List holders
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string, enum: [INDIVIDUAL, BUSINESS, TRUST] } }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
      responses: { '200': { description: OK } }
    post: { tags: [holders, 'role:admin'], summary: HOLD-2 Create holder, responses: { '201': { description: Created } } }
  /api/holders/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    get:   { tags: [holders, 'role:admin', 'role:teller'], summary: HOLD-3, responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Holder' } } } } } }
    patch: { tags: [holders, 'role:admin'], summary: HOLD-4, responses: { '200': { description: OK } } }
  /api/holders/{id}/accounts:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    get:  { tags: [holders, 'role:admin', 'role:teller'], summary: HOLD-5, responses: { '200': { description: OK } } }
    post: { tags: [holders, 'role:admin'], summary: HOLD-6, responses: { '201': { description: Created } } }

  /api/accounts/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:   { tags: [accounts, 'role:admin', 'role:teller'], summary: ACC-1, responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/HolderAccount' } } } } } }
    patch: { tags: [accounts, 'role:admin'], summary: ACC-3, responses: { '200': { description: OK } } }
  /api/accounts/{id}/ledger:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      tags: [accounts, 'role:admin', 'role:teller', 'role:consumer']
      summary: ACC-2 Ledger entries
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to,   in: query, schema: { type: string, format: date } }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
      responses: { '200': { description: OK } }

  /api/transactions:
    get:
      tags: [transactions, 'role:admin', 'role:teller', 'role:auditor']
      summary: TX-1 List transactions
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/TxStatus' } }
        - { name: direction, in: query, schema: { $ref: '#/components/schemas/TxDirection' } }
        - { name: currency, in: query, schema: { $ref: '#/components/schemas/Currency' } }
        - { name: account_id, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to,   in: query, schema: { type: string, format: date } }
        - { name: q, in: query, schema: { type: string } }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
      responses: { '200': { description: OK } }
  /api/transactions/deposit:  { post: { tags: [transactions, 'role:admin', 'role:teller'], summary: TX-2 post_transaction(deposit), responses: { '201': { description: Created } } } }
  /api/transactions/withdraw: { post: { tags: [transactions, 'role:admin', 'role:teller'], summary: TX-3 post_transaction(withdraw), responses: { '201': { description: Created } } } }
  /api/transactions/{tx_id}/correct:
    parameters: [{ name: tx_id, in: path, required: true, schema: { type: string } }]
    post: { tags: [transactions, 'role:admin'], summary: TX-7 correct_transaction, responses: { '201': { description: Created } } }

  /api/approvals:
    get: { tags: [approvals, 'role:admin'], summary: TX-4 Pending queue, parameters: [ { $ref: '#/components/parameters/Limit' }, { $ref: '#/components/parameters/Cursor' } ], responses: { '200': { description: OK } } }
  /api/approvals/{tx_id}/approve:
    parameters: [{ name: tx_id, in: path, required: true, schema: { type: string } }]
    post: { tags: [approvals, 'role:admin'], summary: TX-5 approve_transaction, responses: { '200': { description: OK } } }
  /api/approvals/{tx_id}/reject:
    parameters: [{ name: tx_id, in: path, required: true, schema: { type: string } }]
    post: { tags: [approvals, 'role:admin'], summary: TX-6, responses: { '200': { description: OK } } }

  /api/vaults:
